# Documentation at https://goreleaser.com

# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: gcx

before:
  hooks:
    - go mod tidy

builds:
  - id: gcx
    binary: gcx
    main: ./cmd/gcx

    env:
      - CGO_ENABLED=0

    goos:
      - linux
      - darwin
      - windows

    goarch:
      - amd64
      - arm64

    flags:
      - -trimpath

    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: gcx
    builds: [gcx]
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  header: "{{ .Env.RELEASE_NOTES }}"

brews:
  - repository:
      owner: grafana
      name: homebrew-grafana
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: .
    homepage: "https://github.com/grafana/gcx"
    description: "Grafana Cloud CLI"
    license: "Apache-2.0"
    install: |
      bin.install "gcx"
    test: |
      system "#{bin}/gcx", "--version"

changelog:
  disable: true
