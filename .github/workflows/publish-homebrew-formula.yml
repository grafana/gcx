name: Publish Homebrew Formula

# Triggers automatically when a version tag is pushed (independent of
# GoReleaser completing), or manually via workflow_dispatch for re-runs /
# backfills. Using push:tags rather than release:published because GoReleaser
# runs with GITHUB_TOKEN, and GitHub does not propagate workflow-triggering
# events created by GITHUB_TOKEN to other workflows.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.2.9)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-homebrew-formula-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish formula PR
    runs-on: ubuntu-latest
    permissions:
      contents: read           # checkout gcx at the tag
      id-token: write          # required by create-github-app-token broker OIDC exchange

    env:
      TAG: ${{ inputs.tag || github.ref_name }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Resolve tag and pre-release guard
        id: tag
        # Exit 0 for any SemVer pre-release (tag containing a hyphen, e.g.
        # v1.2.3-rc.1). Homebrew users should only ever see stable
        # releases in the tap.
        run: |
          set -euo pipefail
          if [[ -z "${TAG}" ]]; then
            echo "::warning::no tag provided; skipping"
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [[ "${TAG}" != v* ]]; then
            echo "Input '${TAG}' is not a release tag; skipping"
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [[ "${TAG}" == *-* ]]; then
            echo "Tag '${TAG}' is a pre-release (contains '-'); skipping tap publication"
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          VERSION="${TAG#v}"
          {
            echo "version=${VERSION}"
            echo "branch=gcx-${VERSION}"
            echo "skip=false"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout gcx (for template)
        if: steps.tag.outputs.skip != 'true'
        # On push:tags, github.ref is the tag — checkout gets the template at
        # that ref. On workflow_dispatch, github.ref is the dispatch branch
        # (typically main), which also has the template.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Compute source tarball sha256
        if: steps.tag.outputs.skip != 'true'
        id: sha
        run: |
          set -euo pipefail
          TARBALL_URL="https://github.com/${GH_REPO}/archive/refs/tags/${TAG}.tar.gz"
          echo "Fetching: ${TARBALL_URL}"
          curl -fsSL --retry 3 --retry-delay 5 -o source.tar.gz "${TARBALL_URL}"
          SHA256="$(sha256sum source.tar.gz | awk '{print $1}')"
          if [[ ! "${SHA256}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::computed sha256 is not 64 hex chars: '${SHA256}'"
            exit 1
          fi
          echo "Computed sha256=${SHA256}"
          echo "sha256=${SHA256}" >> "${GITHUB_OUTPUT}"

      - name: Render formula from template
        if: steps.tag.outputs.skip != 'true'
        id: render
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          set -euo pipefail
          TMPL=".github/homebrew/gcx.rb.tmpl"
          if [[ ! -f "${TMPL}" ]]; then
            echo "::error::template missing at ${TMPL}"
            exit 1
          fi
          envsubst '$VERSION $SHA256' < "${TMPL}" > gcx.rb
          # Sanity-check the rendered formula:
          grep -q "^class Gcx < Formula" gcx.rb \
            || { echo "::error::bad formula render (missing class header)"; exit 1; }
          grep -q "sha256 \"${SHA256}\"" gcx.rb \
            || { echo "::error::sha256 not substituted"; exit 1; }
          grep -q "/archive/refs/tags/v${VERSION}.tar.gz" gcx.rb \
            || { echo "::error::version not substituted into URL"; exit 1; }
          echo "Rendered gcx.rb:"
          echo "---"
          cat gcx.rb
          echo "---"
          echo "rb_path=${GITHUB_WORKSPACE}/gcx.rb" >> "${GITHUB_OUTPUT}"

      - name: Mint App installation token
        if: steps.tag.outputs.skip != 'true'
        id: app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@ae92934a14a48b94494dbc06d74a81d47fe08a40 # create-github-app-token/v0.2.2
        with:
          github_app: ${{ vars.PUBLISHER_APP_NAME }}

      - name: Open tap pull request
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RB_PATH: ${{ steps.render.outputs.rb_path }}
          BRANCH: ${{ steps.tag.outputs.branch }}
          VERSION: ${{ steps.tag.outputs.version }}
          TAP_REPO: grafana/homebrew-grafana
        run: |
          set -euo pipefail

          DEFAULT_BRANCH="$(gh api "repos/${TAP_REPO}" --jq .default_branch)"
          BASE_SHA="$(gh api "repos/${TAP_REPO}/git/ref/heads/${DEFAULT_BRANCH}" --jq .object.sha)"

          # Idempotency: if gcx.rb already matches on the default branch, the
          # formula for this version is already published — nothing to do.
          NEW_HASH="$(sha256sum "${RB_PATH}" | awk '{print $1}')"
          CURRENT_HASH="$(gh api "repos/${TAP_REPO}/contents/gcx.rb?ref=${DEFAULT_BRANCH}" --jq '.content' 2>/dev/null \
            | base64 -d 2>/dev/null | sha256sum | awk '{print $1}' || true)"
          if [[ "${NEW_HASH}" == "${CURRENT_HASH}" ]]; then
            echo "gcx.rb on ${DEFAULT_BRANCH} already matches gcx ${VERSION}; nothing to do."
            exit 0
          fi

          # Create (or reset to the default-branch tip) the release branch.
          if gh api "repos/${TAP_REPO}/git/ref/heads/${BRANCH}" >/dev/null 2>&1; then
            gh api -X PATCH "repos/${TAP_REPO}/git/refs/heads/${BRANCH}" \
              -f sha="${BASE_SHA}" -F force=true >/dev/null
          else
            gh api -X POST "repos/${TAP_REPO}/git/refs" \
              -f ref="refs/heads/${BRANCH}" -f sha="${BASE_SHA}" >/dev/null
          fi

          # Current gcx.rb blob SHA on the branch (required to update an
          # existing file via the Contents API).
          FILE_SHA="$(gh api "repos/${TAP_REPO}/contents/gcx.rb?ref=${BRANCH}" --jq '.sha' 2>/dev/null || true)"

          # Commit via the Contents API rather than a local `git commit` +
          # `git push`. Commits created through the API are signed with
          # GitHub's web-flow key and so count as "verified", satisfying the
          # tap's required-signature rule — a plain push from the runner is
          # unsigned and gets rejected (GH013).
          # Flat-layout tap: gcx.rb lives at the repo root, next to alloy.rb /
          # grafana.rb — NOT under Casks/.
          PUT_ARGS=(-X PUT "repos/${TAP_REPO}/contents/gcx.rb"
            -f message="gcx ${VERSION}"
            -f content="$(base64 -w0 "${RB_PATH}")"
            -f branch="${BRANCH}")
          if [[ -n "${FILE_SHA}" ]]; then
            PUT_ARGS+=(-f sha="${FILE_SHA}")
          fi
          gh api "${PUT_ARGS[@]}" >/dev/null

          EXISTING_PR="$(gh pr list \
              --repo "${TAP_REPO}" \
              --head "${BRANCH}" \
              --state all \
              --json number \
              --jq '.[0].number // empty')"

          if [[ -n "${EXISTING_PR}" ]]; then
            echo "PR #${EXISTING_PR} already open for ${BRANCH}; updated branch in place."
            exit 0
          fi

          gh pr create \
            --repo "${TAP_REPO}" \
            --base "${DEFAULT_BRANCH}" \
            --head "${BRANCH}" \
            --title "gcx ${VERSION}" \
            --body "Automated formula bump for [gcx ${VERSION}](https://github.com/grafana/gcx/releases/tag/v${VERSION}). Generated by the gcx release pipeline."
