name: ✨ Feature Request
description: Suggest a completely new capability or feature
title: ✨ Feature Request
labels: ["action/needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for something new? Tell us about it.

  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: Tell us about your feature idea. Try and describe what problem the feature would solve, and any examples of how you think the command or argument structure should look like.
      placeholder: |
        We need to manage datasources across multiple Grafana instances, but
        gcx doesn't currently support datasource resources. We have to
        manually configure datasources through the Grafana UI or use direct API
        calls, which makes it impossible to version-control our datasource configs.

        I'd like to be able to use gcx resources commands with datasources:
        - `gcx resources list datasources` - list all datasources
        - `gcx resources get datasource/<name>` - get a specific datasource
        - `gcx resources pull datasources` - export to local YAML/JSON files
        - `gcx resources push datasources/` - create/update from files
        - `gcx resources delete datasource/<name>` - remove a datasource

        This would work just like it does for dashboards and folders today.
    validations:
      required: true

  - type: textarea
    id: alternatives_considered
    attributes:
      label: Have you tried any workarounds?
      description: What do you do today to solve this problem?
      placeholder: |
        We currently use direct API calls with curl or custom scripts, but it's error-prone
        and doesn't integrate with our existing gcx workflows. We also looked at
        Terraform, but prefer to keep everything in gcx for consistency.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Critical - Blocking my work
        - High - Significantly limiting what I can do
        - Medium - Would improve my workflow
        - Low - Nice to have someday
