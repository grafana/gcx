<!doctype html>
<html>
    <head>
        <title>Connected - gcx</title>
        <style>
            * { box-sizing: border-box; }
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                background: #111217;
                color: #fff;
            }
            .container {
                text-align: center;
                padding: 40px;
                max-width: 480px;
            }
            .checkmark {
                width: 80px;
                height: 80px;
                margin: 0 auto 24px;
                background: rgba(108, 207, 89, 0.1);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .checkmark svg {
                width: 40px;
                height: 40px;
                color: #6ccf59;
            }
            h1 {
                margin: 0 0 12px 0;
                font-size: 28px;
                font-weight: 600;
            }
            p {
                color: #aaa;
                margin: 0 0 24px 0;
                line-height: 1.5;
            }
            .close-note {
                margin-top: 24px;
                font-size: 13px;
                color: #555;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="checkmark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            </div>
            <h1>Connected!</h1>
            <p>gcx is now connected to your Grafana stack.</p>
            <p class="close-note">You can safely close this tab.</p>
        </div>
    </body>
</html>
