<!DOCTYPE html>
<html>
<head>
    <title>Authentication Failed - gcx</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #111217;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 400px;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: rgba(220, 56, 56, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-icon svg {
            width: 40px;
            height: 40px;
            color: #dc3838;
        }
        h1 {
            margin: 0 0 16px 0;
            font-size: 24px;
            font-weight: 600;
        }
        .message {
            background: rgba(220, 56, 56, 0.1);
            border: 1px solid rgba(220, 56, 56, 0.3);
            border-radius: 6px;
            padding: 12px 16px;
            margin: 20px 0;
            color: #ff6b6b;
            font-size: 14px;
        }
        p {
            color: #aaa;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
        </div>
        <h1>Authentication Failed</h1>
        <div class="message">{{.Error}}</div>
        <p>Please close this window and try again.</p>
    </div>
</body>
</html>
